<script>
// ══════════════════════════════════════════════

 function nowTime(){ return new Date().toLocaleTimeString("de-DE", { hour: "2-digit", minute: "2-digit" }); }

 (function(){
var e = React.createElement;
var useState = React.useState;
var useEffect = React.useEffect;
var useMemo = React.useMemo;
var useCallback = React.useCallback;
var Fragment = React.Fragment;

// ── LevelSelector ──

function LevelSelector(props) {
  var value = props.value, onChange = props.onChange, max = props.max || 5, color = props.color, label = props.label, icon = props.icon;
  var circles = [];
  for (var i = 0; i < max; i++) {
    circles.push(e('button', { key: i, className: 'circle-btn', onClick: (function(v){ return function(){ onChange(v); }; })(i + 1),
      style: { background: i < value ? color : 'rgba(0,0,0,0.06)', opacity: i < value ? 1 : 0.35 } }));
  }
  return e('div', { style: { marginBottom: 18 } },
    e('label', { className: 'field-label' }, icon, ' ', label),
    e('div', { style: { display: 'flex', gap: 6, alignItems: 'center' } },
      e('button', { className: 'circle-btn', onClick: function(){ onChange(0); },
        style: { border: value === 0 ? '2px solid ' + color : '1.5px solid var(--c-border)', background: value === 0 ? color + '15' : 'transparent', fontSize: 13, color: 'var(--c-text-soft)', fontFamily: 'var(--f-body)' } }, '\u2013'),
      circles,
      e('span', { style: { fontSize: 13, color: 'var(--c-text-muted)', marginLeft: 2, fontFamily: 'var(--f-body)' } }, value || '\u2013')
    )
  );
}

// ── MucusSelector ──

function MucusSelector(props) {
  var value = props.value, onChange = props.onChange;
  var color = 'var(--c-mucus)';
  var buttons = MUCUS.map(function(m, i) {
    var active = value === i + 1;
    return e('button', { key: i, className: 'circle-btn', title: m.tip, onClick: (function(v){ return function(){ onChange(v); }; })(i + 1),
      style: { background: active ? '#7ba5b8' : 'rgba(0,0,0,0.06)', opacity: active ? 1 : 0.35, fontSize: m.short.length > 1 ? 9 : 12, fontWeight: 600, color: active ? '#fff' : '#8a7c7e', fontFamily: 'var(--f-body)', letterSpacing: -0.3 }
    }, m.short);
  });
  return e('div', { style: { marginBottom: 18 } },
    e('label', { className: 'field-label' }, '\uD83D\uDCA7 Zervixschleim'),
    e('div', { style: { display: 'flex', gap: 6, alignItems: 'center' } },
      e('button', { className: 'circle-btn', onClick: function(){ onChange(0); },
        style: { border: value === 0 ? '2px solid ' + color : '1.5px solid var(--c-border)', background: value === 0 ? color + '15' : 'transparent', fontSize: 13, color: 'var(--c-text-soft)', fontFamily: 'var(--f-body)' } }, '\u2013'),
      buttons
    ),
    value > 0 ? e('div', { style: { fontSize: 12, color: 'var(--c-text-muted)', marginTop: 5, marginLeft: 40 } }, MUCUS[value - 1].tip) : null
  );
}

// ── Toggle ──

function Toggle(props) {
  var value = props.value, onChange = props.onChange, label = props.label;
  return e('div', { style: { display: 'flex', alignItems: 'center', gap: 10, marginBottom: 14, cursor: 'pointer' }, onClick: function(){ onChange(!value); } },
    e('div', { className: 'toggle-track', style: { background: value ? 'var(--c-rose)' : '#ddd5d6' } },
      e('div', { className: 'toggle-thumb', style: { left: value ? 20 : 2 } })
    ),
    e('span', { style: { fontSize: 13, color: 'var(--c-text-soft)', fontFamily: 'var(--f-body)' } }, label)
  );
}

// ── LevelDots ──

function LevelDots(props) {
  var value = props.value, max = props.max || 5, color = props.color, size = props.size || 8;
  var dots = [];
  for (var i = 0; i < max; i++) {
    dots.push(e('div', { key: i, style: { width: size, height: size, borderRadius: '50%', background: i < value ? color : 'rgba(0,0,0,0.07)' } }));
  }
  return e('div', { style: { display: 'flex', gap: 2, alignItems: 'center' } }, dots);
}

// ── TempChart ──

function TempChart(props) {
  var entries = props.entries, dateRange = props.dateRange, fertilityMap = props.fertilityMap || {}, coverlineIn = props.coverlineIn || null, cycleStart = props.cycleStart || null, fullscreen = props.fullscreen || false;
  var _entries = entries, _dateRange = dateRange;

  var allDays = useMemo(function() {
    return _dateRange.map(function(d) {
      var en = _entries[d];
      var tempVal = en && en.temperature ? roundTemp(parseFloat(en.temperature)) : null;
      var tempExcluded = en && en.tempExclude || false;
      return { date: d, temp: tempVal, tempExcluded: tempExcluded, mucus: en ? en.mucus || 0 : 0, mucusExcluded: en ? en.mucusExclude || false : false, bleeding: en ? en.bleeding || 0 : 0 };
    });
  }, [_entries, _dateRange]);

  var measured = allDays.filter(function(d) { return d.temp !== null && !d.tempExcluded; });
  var allTempsArr = allDays.filter(function(d) { return d.temp !== null; });
  var n = allDays.length;

  var coverlineData = useMemo(function() {
    if (coverlineIn && coverlineIn.coverline !== undefined) {
      return { coverline: coverlineIn.coverline };
    }
    if (measured.length < 9) return null;
    for (var i = 6; i <= measured.length - 3; i++) {
      var low6 = measured.slice(i - 6, i).map(function(d) { return d.temp; });
      var cl = Math.max.apply(null, low6);
      var high3 = measured.slice(i, i + 3);
      var allAbove = high3.every(function(d) { return d.temp > cl; });
      if (!allAbove) continue;
      return { coverline: cl };
    }
    return null;
  }, [measured, allDays, coverlineIn]);

  if (allTempsArr.length < 2) return e('div', { style: { padding: 20, textAlign: 'center', color: 'var(--c-text-muted)', fontSize: 13 } }, 'Mind. 2 Temperaturwerte nötig');

  var padL = 50, padR = 12, padT = 20, padB = 78;
  var temps = allTempsArr.map(function(d) { return d.temp; });
  var minT = Math.floor((Math.min.apply(null, temps) - 0.1) * 10) / 10;
  var maxT = Math.ceil((Math.max.apply(null, temps) + 0.1) * 10) / 10;
  var rangeT = maxT - minT || 1;
  var cW = fullscreen ? Math.max(500, window.innerWidth - 32) : Math.max(500, n * 22);
  var cH = fullscreen ? Math.max(340, window.innerHeight - 100) : 340;
  var fontScale = Math.max(0.9, Math.min(cW / 500, 2.2));
  var w = cW - padL - padR, h = cH - padT - padB;
  var pxPerDay = w / Math.max(n, 1);
  var skipX = pxPerDay < 13 ? 3 : pxPerDay < 22 ? 2 : 1;
  function xPos(i) { return padL + (i / (n - 1)) * w; }

  var bgRects = [];
  var stepX = n > 1 ? w / (n - 1) : 0;
  for (var bd = 0; bd < n; bd++) {
    var fVal = fertilityMap[allDays[bd].date];
    if (fVal === 'fertile' || fVal === 'infertile') {
      var leftX = bd === 0 ? padL : xPos(bd) - stepX / 2;
      var rightX = bd < n - 1 ? xPos(bd) + stepX / 2 : cW - padR;
      var fillColor = fVal === 'fertile' ? 'rgba(232,165,173,0.15)' : 'rgba(144,186,134,0.28)';
      bgRects.push(e('rect', { key: 'bg-' + allDays[bd].date, x: leftX, y: padT, width: rightX - leftX, height: h, fill: fillColor }));
    }
  }
  function yPos(t) { return padT + h - ((t - minT) / rangeT) * h; }

  var segments = [];
  var seg = [];
  for (var i = 0; i < n; i++) {
    if (allDays[i].temp !== null && !allDays[i].tempExcluded) seg.push({ idx: i, temp: allDays[i].temp });
    else if (seg.length) { segments.push(seg); seg = []; }
  }
  if (seg.length) segments.push(seg);

  var grid = [];
  for (var t = minT; t <= maxT; t = Math.round((t + 0.1) * 10) / 10) grid.push(t);

  var skipY = grid.length > 12 ? 2 : 1;
  var gridEls = grid.map(function(t, i) {
    return e('g', { key: t },
      e('line', { x1: padL, y1: yPos(t), x2: cW - padR, y2: yPos(t), stroke: '#ece6e7', strokeWidth: '0.5' }),
      i % skipY === 0 ? e('text', { x: padL - 5, y: yPos(t) + 4, textAnchor: 'end', fontSize: Math.round(13 * fontScale), fill: '#a8949a', fontFamily: "'DM Sans',sans-serif" }, t.toFixed(1)) : null
    );
  });

  var segEls = segments.map(function(seg, si) {
    if (seg.length < 2) return null;
    var pts = seg.map(function(p) { return xPos(p.idx).toFixed(1) + ',' + yPos(p.temp).toFixed(1); });
    var pathD = 'M' + pts.join(' L');
    return e('path', { key: si, d: pathD, fill: 'none', stroke: '#c97b84', strokeWidth: '2', strokeLinejoin: 'round', strokeLinecap: 'round' });
  });

  var monthNames = ['Jan', 'Feb', 'Mär', 'Apr', 'Mai', 'Jun', 'Jul', 'Aug', 'Sep', 'Okt', 'Nov', 'Dez'];

  var dotEls = [];
  var labelEls = [];
  var mucusEls = [];
  var bleedEls = [];
  var monthEls = [];
  var lastMonth = '';
  for (var j = 0; j < allDays.length; j++) {
    var d = allDays[j];
    if (d.temp !== null) {
      var isExcl = d.tempExcluded;
      dotEls.push(
         e('g', { key: d.date, style: { cursor: 'pointer' }, onClick: (function(date){ return function(){ if (props.onDateClick) props.onDateClick(date); }; })(d.date) },
          e('circle', { cx: xPos(j), cy: yPos(d.temp), r: '10', fill: 'transparent', stroke: 'none' }),
          e('circle', { cx: xPos(j), cy: yPos(d.temp), r: '3.5', fill: isExcl ? '#fff0f0' : '#fff', stroke: isExcl ? '#d49595' : '#c97b84', strokeWidth: isExcl ? '1' : '1.5', opacity: isExcl ? 0.6 : 1 })
        )
      );
    }
    if (d.bleeding > 0) {
      var bleedH = d.bleeding * 4;
      var isSpotting = _entries[d.date] && _entries[d.date].spotting;
      bleedEls.push(e('rect', { key: 'bl-' + d.date, x: xPos(j) - 4, y: padT + h - bleedH, width: 8, height: bleedH, rx: 2, fill: 'var(--c-blood)', opacity: isSpotting ? 0.15 : (0.25 + d.bleeding * 0.12) }));
    }

    // ── Row 1: Mucus as colored boxes ──
    var mVal = d.mucus;
    var mExcl = d.mucusExcluded;
    var boxColors = ['', '#d4cdcd', '#bdb3b3', '#e8d44d', '#a8d4e6', '#3a6a8e'];
    if (mVal > 0) {
      mucusEls.push(e('rect', { key: 'm-' + d.date, x: xPos(j) - 5.5, y: padT + h + 2, width: 11, height: 13, rx: 3, fill: boxColors[mVal] || '#7ba5b8', opacity: mExcl ? 0.4 : 1, stroke: mExcl ? '#d49595' : 'none', strokeWidth: mExcl ? 1 : 0 }));
      if (mVal >= 4) {
        var sLabel = mVal === 4 ? 'S' : 'S+';
        mucusEls.push(e('text', { key: 'mt-' + d.date, x: xPos(j), y: padT + h + 13, textAnchor: 'middle', fontSize: Math.round(9 * fontScale), fill: mVal === 4 ? '#3a5a6a' : '#fff', fontFamily: "'DM Sans',sans-serif", fontWeight: 700 }, sLabel));
      }
    }

    // ── Row 2: ZT number or dash ──
    var ztText = cycleStart ? String(daysBetween(cycleStart, d.date) + 1) : '\u2013';
    if (j % skipX === 0) labelEls.push(e('text', { key: 'cd-' + d.date, x: xPos(j), y: padT + h + 30, textAnchor: 'middle', fontSize: Math.round(10 * fontScale), fill: cycleStart ? '#b8a0a8' : '#d4cbcc', fontFamily: "'DM Sans',sans-serif" }, ztText));

    // ── Row 3: Day of month ──
    var dayNum = d.date.slice(8);
    if (j % skipX === 0) labelEls.push(e('text', { key: 'lbl-' + d.date, x: xPos(j), y: padT + h + 47, textAnchor: 'middle', fontSize: Math.round(10 * fontScale), fill: d.temp !== null ? '#a8949a' : '#d4cbcc', fontFamily: "'DM Sans',sans-serif" }, dayNum));

    // ── Row 4: Month at boundaries ──
    var monthStr = d.date.slice(5, 7);
    if (monthStr !== lastMonth && j % skipX === 0) {
      lastMonth = monthStr;
      monthEls.push(e('text', { key: 'mo-' + d.date, x: xPos(j), y: padT + h + 64, textAnchor: 'middle', fontSize: Math.round(10 * fontScale), fill: '#a8949a', fontFamily: "'DM Sans',sans-serif", fontWeight: 500 }, monthNames[parseInt(monthStr) - 1]));
    } else if (monthStr !== lastMonth) {
      lastMonth = monthStr;
    }
  }

  return e('div', { style: { marginLeft: -4, marginRight: -4, paddingBottom: 4 } },
    e('svg', { viewBox: '0 0 ' + cW + ' ' + cH, style: { width: '100%', height: 'auto', minHeight: fullscreen ? cH : 280, display: 'block' } },
      bgRects,
      gridEls,
      segEls,
      coverlineData ? e('line', { x1: padL, y1: yPos(coverlineData.coverline), x2: cW - padR, y2: yPos(coverlineData.coverline), stroke: '#a8677e', strokeWidth: '1.2', strokeDasharray: '5 3', opacity: '.7' }) : null,
      dotEls,
      bleedEls,
      mucusEls,
      labelEls,
      monthEls
    )
  );
}

// ── BarChart ──

function BarChart(props) {
  var data = props.data, metric = props.metric, color = props.color || 'var(--c-rose)', fullscreen = props.fullscreen || false;
  if (!data || !data.length) return e('div', { style: { padding: 20, textAlign: 'center', color: 'var(--c-text-muted)', fontSize: 13 } }, 'Keine Daten');

  var padL = 50, padR = 12, padT = 16, padB = 36;
  var cW = fullscreen ? Math.max(500, window.innerWidth - 32) : 500;
  var cH = fullscreen ? Math.max(320, window.innerHeight - 100) : 320;
  var fontScale = Math.max(0.9, Math.min(cW / 500, 2.2));
  var w = cW - padL - padR, h = cH - padT - padB;
  var n = data.length;
  var barW = Math.min(32, (w / n) * 0.7);
  var gap = w / n;
  function xPos(i) { return padL + i * gap + (gap - barW) / 2; }

  var values = data.map(function(d) { return d[metric] || 0; });
  var maxVal = Math.max.apply(null, values) || 1;
  var yMax = Math.ceil(maxVal * 1.15);

  var labels = [metric === 'length' ? 'Zykluslänge (Tage)' : metric === 'umrandetDay' ? '1. unfruchtb. Tag' : 'Unfruchtb. Phase (Tage)'];
  var labelMaxLen = Math.max.apply(null, labels.map(function(l) { return l.length; }));

  var gridLines = [];
  var step = yMax <= 10 ? 1 : yMax <= 30 ? 5 : 10;
  for (var gy = 0; gy <= yMax; gy += step) {
    var y = padT + h - (gy / yMax) * h;
    gridLines.push(e('g', { key: 'g' + gy },
      e('line', { x1: padL, y1: y, x2: cW - padR, y2: y, stroke: '#ece6e7', strokeWidth: '0.5' }),
      e('text', { x: padL - 5, y: y + 4, textAnchor: 'end', fontSize: Math.round(13 * fontScale), fill: '#a8949a', fontFamily: "'DM Sans',sans-serif" }, gy)
    ));
  }

  var skipBarX = n > 40 ? 3 : n > 20 ? 2 : 1;
  var bars = data.map(function(d, i) {
    var val = d[metric] || 0;
    var barH = (val / yMax) * h;
    var x = xPos(i);
    var y = padT + h - barH;
    var isExcl = d.excluded && metric !== 'length';
    return e('g', { key: i },
      e('rect', { x: x, y: y, width: barW, height: barH, rx: 3, fill: isExcl ? 'url(#hatch)' : color, opacity: isExcl ? 0.55 : 0.85 }),
      e('text', { x: x + barW / 2, y: y - 6, textAnchor: 'middle', fontSize: Math.round(9 * fontScale), fill: isExcl ? '#b0a0a4' : '#6b5c5e', fontFamily: "'DM Sans',sans-serif", fontWeight: 500 }, val || ''),
      i % skipBarX === 0 ? e('text', { x: x + barW / 2, y: padT + h + 14, textAnchor: 'middle', fontSize: Math.round(7.5 * fontScale), fill: isExcl ? '#c4b8ba' : '#a8949a', fontFamily: "'DM Sans',sans-serif", transform: 'rotate(-35,' + (x + barW / 2) + ',' + (padT + h + 14) + ')' }, d.label) : null
    );
  });

  return e('div', { style: { overflow: 'visible' } },
    e('svg', { viewBox: '0 0 ' + cW + ' ' + cH, style: { width: '100%', height: 'auto', minHeight: fullscreen ? cH : 260, display: 'block' } },
      e('defs', null,
        e('pattern', { id: 'hatch', patternUnits: 'userSpaceOnUse', width: 6, height: 6, patternTransform: 'rotate(45)' },
          e('line', { x1: 0, y1: 0, x2: 0, y2: 6, stroke: color, strokeWidth: 1.5, opacity: 0.6 })
        )
      ),
      gridLines,
      bars
    )
  );
}

// ── EMPTY_ENTRY ──
var EMPTY_ENTRY = { temperature: '', method: 'vaginal', tempExclude: false, tempExcludeReason: [], bleeding: 0, spotting: false, mucus: 0, mucusExclude: false, pain: 0, notes: '', time: '' };

// ── App ──

function App() {
  var _s = useState(loadEntries); var entries = _s[0], setEntries = _s[1];
  var _v = useState('calendar'); var view = _v[0], setView = _v[1];
  var _d = useState(fmt(new Date())); var selectedDate = _d[0], setSelectedDate = _d[1];
  var _m = useState(new Date().getMonth()); var calMonth = _m[0], setCalMonth = _m[1];
  var _y = useState(new Date().getFullYear()); var calYear = _y[0], setCalYear = _y[1];
  var _p = useState(''); var syncPassword = _p[0], setSyncPassword = _p[1];
  var _t = useState(''); var toast = _t[0], setToast = _t[1];
  var _si = useState(null); var statsCycleIdx = _si[0], setStatsCycleIdx = _si[1];
  var _bm = useState('length'); var barMetric = _bm[0], setBarMetric = _bm[1];
  var _bp = useState(0); var barChartPage = _bp[0], setBarChartPage = _bp[1];
  var _co = useState(true); var criteriaExpanded = _co[0], setCriteriaExpanded = _co[1];
  var _st = useState(loadSettings); var settings = _st[0], setSettings = _st[1];
  var _nr = useState(''); var newReason = _nr[0], setNewReason = _nr[1];
  var _fc = useState(null); var fullscreenChart = _fc[0], setFullscreenChart = _fc[1];

  var saveEntries = useCallback(function(ne) { setEntries(ne); persistEntries(ne); }, []);
  var saveAppSettings = useCallback(function(ns) { var merged = Object.assign({}, settings, ns); setSettings(merged); saveSettings(merged); }, [settings]);
  var showToast = function(msg) { setToast(msg); setTimeout(function() { setToast(''); }, 2400); };

  useEffect(function() {
    if (!fullscreenChart) return;
    function onKey(e) { if (e.key === 'Escape') setFullscreenChart(null); }
    window.addEventListener('keydown', onKey);
    return function() { window.removeEventListener('keydown', onKey); };
  }, [fullscreenChart]);

  var currentEntry = entries[selectedDate] || Object.assign({}, EMPTY_ENTRY, { time: nowTime() });
  function updateEntry(field, value) {
    var ce = entries[selectedDate] || Object.assign({}, EMPTY_ENTRY, { time: nowTime() });
    var updated = {};
    for (var k in ce) updated[k] = ce[k];
    updated[field] = value;
    if (field === 'bleeding' && value === 0) updated.spotting = false;
    updated.time = field === 'time' ? value : (ce.time || nowTime());
    var ne = {};
    for (var k2 in entries) ne[k2] = entries[k2];
    ne[selectedDate] = updated;
    saveEntries(ne);
  }
  function shiftDate(days) { var d = parseLocal(selectedDate); d.setDate(d.getDate() + days); setSelectedDate(fmt(d)); }

  async function handleExport() {
    if (!syncPassword || syncPassword.length < 6) { showToast('Passwort: min. 6 Zeichen'); return; }
    try {
      var enc = await encryptData(entries, syncPassword);
      var blob = new Blob([enc], { type: 'application/json' });
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a'); a.href = url; a.download = 'cycle-data-' + fmt(new Date()) + '.enc.json'; a.click();
      URL.revokeObjectURL(url); showToast('Export \u2713');
    } catch(e) { showToast('Export fehlgeschlagen'); }
  }
  async function handleImport(ev) {
    var file = ev.target.files ? ev.target.files[0] : null;
    if (!file || !syncPassword || syncPassword.length < 6) { showToast('Datei + Passwort nötig'); return; }
    try {
      var text = await file.text();
      var dec = await decryptData(text, syncPassword);
      var merged = {};
      for (var k in entries) merged[k] = entries[k];
      for (var k2 in dec) merged[k2] = dec[k2];
      saveEntries(merged);
      showToast(Object.keys(dec).length + ' importiert \u2713');
    } catch(e) { showToast('Falsches Passwort?'); }
  }

  function handleCsvExport() {
    try {
      var csv = entriesToCsv(entries);
      var blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8' });
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a'); a.href = url; a.download = 'cycle-data-' + fmt(new Date()) + '.csv'; a.click();
      URL.revokeObjectURL(url); showToast('CSV Export \u2713');
    } catch(e) { showToast('CSV Export fehlgeschlagen'); }
  }
  function handleCsvImport(ev) {
    var file = ev.target.files ? ev.target.files[0] : null;
    if (!file) { showToast('Keine Datei gewählt'); return; }
    try {
      var reader = new FileReader();
      reader.onload = function(e) {
